<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sjgoodapps Support and Privacy</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --card: #ffffff;
      --text: #18212b;
      --muted: #5f6874;
      --accent: #0f5a7a;
      --border: #d9dde3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #ece7da 0%, var(--bg) 220px);
      color: var(--text);
      line-height: 1.6;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(24, 33, 43, 0.08);
    }

    h1, h2 { line-height: 1.2; }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    h2 { margin-top: 28px; font-size: 1.15rem; }

    p, li { font-size: 1rem; }

    .muted { color: var(--muted); }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    ul {
      padding-left: 1.2rem;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>sjgoodapps</h1>
      <p class="muted">Official support and privacy pages for apps published by sjgoodapps.</p>

      <p>If you need help with an app, want to report a bug, or have a privacy question, use the links below.</p>

      <h2>Pages</h2>
      <ul>
        <li><a href="sjgoodapps/support.html">Support</a></li>
        <li><a href="sjgoodapps/privacy.html">Privacy Policy</a></li>
      </ul>

      <h2>Contact</h2>
      <p><strong>Email:</strong> <a href="mailto:sjgoodapps@gmail.com">sjgoodapps@gmail.com</a></p>
    </section>
  </main>
</body>
</html>
